name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 57.131.46.71
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/qwerty
            git pull origin main
            npm install --omit=dev
            node -e "require.resolve('openai')" || { echo "openai o'rnatilmagan — node_modules ni tekshiring"; exit 1; }
            npm run build
            pm2 restart kinova-bot
